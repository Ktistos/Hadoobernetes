apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-init
  namespace: mapreduce
spec:
  backoffLimit: 7
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: ktistos/postgres-init:latest
          imagePullPolicy: Never # Built locally by init_scripts/minikube-init.sh
          env:
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: "5432"
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
          command:
            - sh
            - -c
            - |
              until pg_isready -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d "$PGDATABASE"; do
                echo "Waiting for Postgres..."
                sleep 2
              done
      containers:
        - name: postgres-init
          image: ktistos/postgres-init:latest
          imagePullPolicy: Never # Built locally by init_scripts/minikube-init.sh
          env:
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          command:
            - sh
            - -c
            - |
              # Idempotently ensure the target database exists before running init.sql.
              # Postgres only auto-creates POSTGRES_DB on a fresh data dir, so a
              # pre-existing volume would otherwise leave "$PGDATABASE" missing.
              if [ "$(psql -tAc "SELECT 1 FROM pg_database WHERE datname='$PGDATABASE'" \
                        -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d postgres)" != "1" ]; then
                echo "Database $PGDATABASE not found; creating it."
                psql -v ON_ERROR_STOP=1 \
                  -h "$PGHOST" -p "$PGPORT" -U "$PGUSER" -d postgres \
                  -c "CREATE DATABASE \"$PGDATABASE\" OWNER \"$PGUSER\""
              fi
              psql -v ON_ERROR_STOP=1 \
                -h "$PGHOST" \
                -p "$PGPORT" \
                -U "$PGUSER" \
                -d "$PGDATABASE" \
                -f /sql/init.sql
