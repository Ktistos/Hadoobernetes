apiVersion: v1
kind: ServiceAccount
metadata:
  name: mapreduce-sa
  namespace: mapreduce
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mapreduce-role
  namespace: mapreduce
rules:
# batch/v1 Jobs: the Cluster Manager spawns the per-job master Job, and the
# Job Master spawns mapper/reducer worker Jobs.
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "delete", "get", "list", "watch"]
# Core API group: pods (worker/master pods) and services (the per-job headless
# Service that gives each Job Master a stable DNS name for worker pings).
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["create", "delete", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mapreduce-rolebinding
  namespace: mapreduce
subjects:
- kind: ServiceAccount
  name: mapreduce-sa
  namespace: mapreduce
roleRef:
  kind: Role
  name: mapreduce-role
  apiGroup: rbac.authorization.k8s.io