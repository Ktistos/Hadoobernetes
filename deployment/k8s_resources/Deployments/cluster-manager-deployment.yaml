apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-manager
  namespace: mapreduce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cluster-manager
  template:
    metadata:
      labels:
        app: cluster-manager
    spec:
      serviceAccountName: mapreduce-sa # Ensure this service account has RBAC permissions to spawn Jobs!
      containers:
        - name: cluster-manager
          image: hadoobernetes/cluster-manager:latest
          imagePullPolicy: Never # Forces Minikube to use the local image we build
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            - name: KEYCLOAK_URL
              value: "http://keycloak:8080" # Internal service name
            - name: POSTGRES_HOST
              value: "postgres" # Internal service name
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: CLUSTER_MANAGER_URL
              value: "http://cluster-manager:8000"
            - name: K8S_NAMESPACE
              value: "mapreduce"
            - name: MINIO_ENDPOINT
              value: "minio.minio-tenant.svc.cluster.local:80"
            - name: MINIO_BUCKET
              value: "mapreduce"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: MINIO_ROOT_PASSWORD
            - name: INTERNAL_UPDATE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: internal-secret
                  key: INTERNAL_UPDATE_TOKEN
